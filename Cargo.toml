[package]
name = "stark-v"
version = "0.1.0"
edition = "2024"

[workspace]
resolver = "3"
members = ["crates/builder", "crates/prover", "crates/runner"]
exclude = ["guests/playground"]

[dependencies]
clap = { version = "4.5.17", features = ["derive"] }
eyre = "0.6"
builder = { path = "crates/builder" }
runner = { path = "crates/runner" }
