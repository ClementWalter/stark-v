[package]
name = "guest-bin"
version = "0.1.0"
edition = "2024"

# Binaries are auto-discovered from src/bin/ which are generated by build.rs

[features]
default = ["alloc"]
alloc = ["guest-lib/alloc"]
revm = ["alloc", "guest-lib/revm"]

[dependencies]
guest-lib = { path = "../guest-lib" }
postcard = { version = "1", default-features = false }
serde = { version = "1", default-features = false }

[patch.crates-io]
radium = { path = "../../vendor/radium-0.7.0" }
revm-interpreter = { path = "../../vendor/revm-interpreter-1.3.0" }
revm-primitives = { path = "../../vendor/revm-primitives-1.3.0" }
