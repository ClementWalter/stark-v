[package]
name = "claudeth"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["lib", "staticlib"]

[dependencies]
serde = { workspace = true, features = ["derive", "alloc"] }
sha3 = { version = "0.10", default-features = false }

[dev-dependencies]
serde_json = { workspace = true }
hex = { workspace = true }
