# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
  version: 1.25.0
# Trunk provides extensibility via plugins. (https://docs.trunk.io/plugins)
plugins:
  sources:
    - id: trunk
      ref: v1.7.4
      uri: https://github.com/trunk-io/plugins
# Many linters and tools depend on runtimes - configure them here. (https://docs.trunk.io/runtimes)
runtimes:
  enabled:
    - node@22.16.0
    - python@3.10.8
# This is the section where you manage your linters. (https://docs.trunk.io/check/configuration)
lint:
  enabled:
    - cspell@9.4.0
    - checkov@3.2.495
    - clippy@1.91.0
    - git-diff-check
    - markdownlint@0.46.0
    - osv-scanner@2.3.0
    - prettier@3.7.4
    - rustfmt@1.91.0
    - taplo@0.10.0
    - trufflehog@3.91.2
    - yamllint@1.37.1
  ignore:
    - linters: [ALL]
      paths:
        # Test fixture for risc0 guest compilation - not part of main workspace
        - tests/fixtures/**
    - linters: [osv-scanner]
      paths:
        # Transitive dependency from rrs-lib - paste is unmaintained but not a security issue
        - Cargo.lock
actions:
  disabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
  enabled:
    - trunk-upgrade-available
