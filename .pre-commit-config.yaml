repos:
  - repo: local
    hooks:
      - id: no-orphan-rust-files
        name: No orphan Rust files
        language: system
        pass_filenames: false
        entry: uv run scripts/check_no_orphan_rust_files.py

      - id: cspell-auto-add
        name: CSpell auto-add unknown words
        language: system
        pass_filenames: false
        entry: uv run scripts/cspell_auto_add_words.py

      - id: protected-paths
        name: Protected paths unchanged
        language: system
        pass_filenames: false
        entry: uv run scripts/check_protected_paths.py

      - id: cargo-clippy
        name: Cargo clippy
        language: system
        pass_filenames: false
        entry: cargo clippy -p claudeth -- -D warnings

      - id: cargo-test
        name: Cargo test
        language: system
        pass_filenames: false
        entry: cargo test --release -p claudeth
