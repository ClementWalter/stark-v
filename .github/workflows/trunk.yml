name: CI - Trunk

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  format-and-lint:
    name: Trunk Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-01-29
          targets: riscv32im-unknown-none-elf
          components: clippy, rustfmt

      - name: Trunk
        uses: trunk-io/trunk-action@v1
