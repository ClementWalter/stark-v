name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-07-14

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Build (release)
        run: cargo build --release

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          targets: riscv32im-unknown-none-elf
          toolchain: nightly-2025-07-14

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Run tests (release)
        run: cargo test --release
